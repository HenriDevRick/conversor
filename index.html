<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DocConvert | Conversor Online</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#667eea,#764ba2);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    background:#fff;
    width:95%;
    max-width:600px;
    padding:30px;
    border-radius:16px;
    box-shadow:0 20px 50px rgba(0,0,0,0.2);
    text-align:center;
}

h1{
    margin-bottom:20px;
    color:#333;
}

select,input,button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:8px;
    border:1px solid #ddd;
    font-size:14px;
}

button{
    background:#667eea;
    color:white;
    border:none;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    background:#5a67d8;
}

#loader{
    display:none;
    margin-top:20px;
}

.spinner{
    border:5px solid #eee;
    border-top:5px solid #667eea;
    border-radius:50%;
    width:40px;
    height:40px;
    animation:spin 1s linear infinite;
    margin:auto;
}

@keyframes spin{
    100%{transform:rotate(360deg);}
}

#downloads{
    margin-top:20px;
    text-align:left;
}

#downloads a, #downloads p{
    display:block;
    padding:10px;
    background:#f4f4f4;
    border-radius:6px;
    margin-top:5px;
    text-decoration:none;
    color:#333;
    font-size:14px;
}

#downloads a:hover{
    background:#e2e8f0;
}
</style>
</head>
<body>

<div class="container">
    <h1><i class="fa-solid fa-file-arrow-up"></i> DocConvert</h1>

    <select id="conversionType">
        <option value="pdf_docx">PDF → DOCX</option>
        <option value="txt_pdf">TXT → PDF</option>
        <option value="txt_docx">TXT → DOCX</option>
    </select>

    <input type="file" id="fileInput" multiple>

    <button onclick="convertFiles()">
        <i class="fa-solid fa-gear"></i> Converter Arquivos
    </button>

    <div id="loader">
        <div class="spinner"></div>
        <p>Convertendo...</p>
    </div>

    <div id="downloads"></div>
</div>

<script>
let selectedFiles = [];
const fileInput = document.getElementById("fileInput");

fileInput.addEventListener("change",(e)=>{
    selectedFiles=[...e.target.files];

    const list=document.getElementById("downloads");
    list.innerHTML="";

    selectedFiles.forEach(file=>{
        const p=document.createElement("p");
        p.innerHTML='<i class="fa-solid fa-file"></i> '+file.name;
        list.appendChild(p);
    });
});

function convertFiles(){

    if(selectedFiles.length===0){
        alert("Selecione ao menos um arquivo!");
        return;
    }

    const formData=new FormData();
    const conversionType=document.getElementById("conversionType").value;

    selectedFiles.forEach((file,i)=>{
        formData.append("file"+i,file);
    });

    formData.append("conversion_type",conversionType);

    document.getElementById("loader").style.display="block";
    document.getElementById("downloads").innerHTML="";

    const xhr=new XMLHttpRequest();
    xhr.open("POST","/api/convert",true);

    xhr.onload=function(){
        document.getElementById("loader").style.display="none";

        if(xhr.status!==200){
            alert("Erro na conversão.");
            return;
        }

        const response=JSON.parse(xhr.responseText);

        response.forEach(file=>{
            const link=document.createElement("a");

            const blob=b64toBlob(file.content);
            const url=URL.createObjectURL(blob);

            link.href=url;
            link.download=file.filename;
            link.innerHTML='<i class="fa-solid fa-download"></i> '+file.filename;

            document.getElementById("downloads").appendChild(link);
        });
    };

    xhr.send(formData);
}

function b64toBlob(b64Data){
    const byteCharacters=atob(b64Data);
    const byteNumbers=new Array(byteCharacters.length);

    for(let i=0;i<byteCharacters.length;i++){
        byteNumbers[i]=byteCharacters.charCodeAt(i);
    }

    const byteArray=new Uint8Array(byteNumbers);
    return new Blob([byteArray]);
}
</script>

</body>
</html>
