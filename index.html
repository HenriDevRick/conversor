<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DocConvert</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
    margin:0;
    font-family:Inter, Arial, sans-serif;
    background:#f5f7fb;
}

.wrapper{
    max-width:700px;
    margin:80px auto;
    padding:40px;
    background:white;
    border-radius:16px;
    box-shadow:0 10px 40px rgba(0,0,0,0.08);
}

h1{
    margin:0 0 20px;
    font-weight:600;
    font-size:26px;
}

.select{
    width:100%;
    padding:14px;
    border-radius:10px;
    border:1px solid #ddd;
    margin-bottom:20px;
}

.upload-area{
    border:2px dashed #cfd8e3;
    padding:40px;
    text-align:center;
    border-radius:12px;
    cursor:pointer;
    transition:0.3s;
}

.upload-area:hover{
    border-color:#4f46e5;
}

.upload-area i{
    font-size:30px;
    color:#4f46e5;
}

.upload-area p{
    margin-top:10px;
    color:#555;
}

button{
    width:100%;
    margin-top:20px;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#4f46e5;
    color:white;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#4338ca;
}

#loader{
    display:none;
    text-align:center;
    margin-top:20px;
}

#downloads a{
    display:block;
    margin-top:10px;
    padding:12px;
    border-radius:8px;
    background:#eef2ff;
    text-decoration:none;
    color:#1e1e1e;
}
</style>
</head>
<body>

<div class="wrapper">
    <h1>DocConvert</h1>

    <select id="conversionType" class="select">
        <option value="pdf_docx">PDF → DOCX</option>
        <option value="txt_pdf">TXT → PDF</option>
        <option value="txt_docx">TXT → DOCX</option>
    </select>

    <div class="upload-area" onclick="fileInput.click()">
        <i class="fa-solid fa-cloud-arrow-up"></i>
        <p>Clique para enviar arquivos</p>
        <input type="file" id="fileInput" hidden multiple>
    </div>

    <div id="fileList"></div>

    <button onclick="convertFiles()">Converter Arquivos</button>

    <div id="loader">Convertendo...</div>
    <div id="downloads"></div>
</div>

<script>
let selectedFiles=[];
const fileInput=document.getElementById("fileInput");

fileInput.addEventListener("change",(e)=>{
    selectedFiles=[...e.target.files];
    const list=document.getElementById("fileList");
    list.innerHTML="";
    selectedFiles.forEach(file=>{
        list.innerHTML+=`<p>${file.name}</p>`;
    });
});

function convertFiles(){
    if(selectedFiles.length===0){
        alert("Selecione arquivos.");
        return;
    }

    const formData=new FormData();
    const type=document.getElementById("conversionType").value;

    selectedFiles.forEach((file,i)=>{
        formData.append("file"+i,file);
    });

    formData.append("conversion_type",type);

    document.getElementById("loader").style.display="block";
    document.getElementById("downloads").innerHTML="";

    fetch("/api/convert",{
        method:"POST",
        body:formData
    })
    .then(res=>res.json())
    .then(data=>{
        document.getElementById("loader").style.display="none";

        data.forEach(file=>{
            const blob=b64toBlob(file.content);
            const url=URL.createObjectURL(blob);

            const link=document.createElement("a");
            link.href=url;
            link.download=file.filename;
            link.innerHTML="⬇ "+file.filename;

            document.getElementById("downloads").appendChild(link);
        });
    })
    .catch(err=>{
        document.getElementById("loader").style.display="none";
        alert("Erro na conversão.");
        console.error(err);
    });
}

function b64toBlob(b64){
    const byteCharacters=atob(b64);
    const byteNumbers=new Array(byteCharacters.length);
    for(let i=0;i<byteCharacters.length;i++){
        byteNumbers[i]=byteCharacters.charCodeAt(i);
    }
    return new Blob([new Uint8Array(byteNumbers)]);
}
</script>

</body>
</html>
